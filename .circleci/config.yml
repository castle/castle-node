version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.17
    working_directory: ~/repo
    resource_class: small

commands:
  app-cache-restore:
    steps:
      - restore_cache:
          keys:
            - yarn-packages-{{ arch }}-{{ checksum "yarn.lock" }}-v1
  app-cache-save:
    steps:
      - save_cache:
          name: Save Yarn Package Cache
          key: yarn-packages-{{ arch }}-{{ checksum "yarn.lock" }}-v1
          paths:
            - node_modules
            - ~/.cache/yarn

jobs:
  dependencies:
    executor: node
    steps:
      - checkout
      - app-cache-restore
      - run: yarn install --frozen-lockfile
      - app-cache-save
  lint:
    executor: node
    steps:
      - checkout
      - app-cache-restore
      - run: yarn lint-verify
  format:
    executor: node
    steps:
      - checkout
      - app-cache-restore
      - run: yarn format
  test:
    executor: node
    steps:
      - checkout
      - app-cache-restore
      - run: yarn jest --runInBand
  build:
    executor: node
    steps:
      - checkout
      - app-cache-restore
      - run: yarn build

workflows:
  version: 2
  build_and_test:
    jobs:
      - dependencies
      - lint:
          requires:
            - dependencies
      - format:
          requires:
            - dependencies
      - test:
          requires:
            - dependencies
      - build:
          requires:
            - dependencies
